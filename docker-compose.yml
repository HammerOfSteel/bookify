services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookify
      POSTGRES_USER: bookify
      POSTGRES_PASSWORD: bookify
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://bookify:bookify@db:5432/bookify?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: bookify-dev-secret-do-not-use-in-prod
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/storage:/app/public/storage
    command: sh -c "npm install && npm run db:push && npm run db:seed && npm run dev"

volumes:
  postgres_data: